name: CodexGauge
options:
  bundleIdPrefix: com.codex-gauge
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targets:
  CodexGauge:
    type: application
    platform: macOS
    sources:
      - path: CodexQuotaWidget
    dependencies:
      - sdk: SystemConfiguration.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex-gauge
        CODE_SIGN_ENTITLEMENTS: CodexQuotaWidget/CodexQuotaWidget.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    info:
      path: CodexQuotaWidget/Info.plist
      properties:
        CFBundleDisplayName: "CodexGauge"
